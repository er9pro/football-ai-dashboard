<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Football AI Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { font-size: 2.5rem; margin-bottom: 10px; }
.filters { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
.filter-group { display: flex; flex-direction: column; gap: 5px; }
.filter-group label { font-size: 0.9rem; opacity: 0.9; }
.filter-group select, .filter-group input { padding: 8px 15px; border-radius: 8px; border: none; font-size: 1rem; }
button { background: #4CAF50; color: white; padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; }
button:hover { background: #45a049; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat-card { background: rgba(255,255,255,0.15); padding: 20px; border-radius: 12px; text-align: center; }
.stat-card h3 { font-size: 2rem; margin-bottom: 5px; }
.stat-card p { opacity: 0.8; }
.matches { display: grid; gap: 20px; }
.match-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
.match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.match-teams { display: flex; justify-content: space-between; align-items: center; font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; }
.match-teams span { flex: 1; }
.match-teams .vs { flex: 0; padding: 0 15px; opacity: 0.7; font-size: 1rem; }
.predictions { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.prediction-group h4 { margin-bottom: 10px; font-size: 0.9rem; opacity: 0.8; }
.prob-bar { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
.prob-fill { height: 25px; border-radius: 5px; display: flex; align-items: center; padding: 0 10px; font-weight: 600; transition: 0.3s; }
.prob-1 { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
.prob-X { background: linear-gradient(90deg, #FF9800, #FFC107); }
.prob-2 { background: linear-gradient(90deg, #F44336, #E91E63); }
.value-bets { background: rgba(255,215,0,0.2); border: 2px solid #FFD700; border-radius: 8px; padding: 15px; margin-top: 15px; }
.value-bet-item { background: rgba(255,215,0,0.3); padding: 8px 12px; border-radius: 5px; margin-bottom: 8px; font-weight: 600; }
.confidence { display: inline-block; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }
.loading { text-align: center; padding: 50px; font-size: 1.2rem; }
.error { background: rgba(244,67,54,0.3); border: 2px solid #F44336; padding: 20px; border-radius: 10px; text-align: center; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>⚽ Football AI Betting Dashboard</h1>
<p>AI-powered predictions with xG, PPDA & injury analysis</p>
</div>
<div class="filters">
<div class="filter-group">
<label>Лига</label>
<select id="leagueFilter">
<option value="all">Все лиги</option>
<option value="Premier League">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
<option value="La Liga">🇪🇸 La Liga</option>
<option value="Serie A">🇮🇹 Serie A</option>
<option value="Bundesliga">🇩🇪 Bundesliga</option>
</select>
</div>
<div class="filter-group">
<label>Min Value %</label>
<input type="number" id="valueFilter" value="5" min="0" step="1">
</div>
<div class="filter-group">
<label>Min Confidence</label>
<input type="number" id="confFilter" value="60" min="0" max="100" step="5">
</div>
<button onclick="loadPredictions()">🔄 Refresh</button>
</div>
<div class="stats" id="stats"></div>
<div class="matches" id="matches"></div>
</div>
<script>
let allPredictions = [];
function loadPredictions() {
  document.getElementById('matches').innerHTML = '<div class="loading">Загрузка прогнозов...</div>';
  fetch('/api/predictions')
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        allPredictions = data.data;
        updateStats(data);
        filterAndDisplay();
      } else {
        document.getElementById('matches').innerHTML = `<div class="error">❌ ${data.error}</div>`;
      }
    })
    .catch(e => {
      document.getElementById('matches').innerHTML = `<div class="error">❌ ${e.message}</div>`;
    });
}
function updateStats(data) {
  const valueBets = data.data.filter(p => p.value_bets.length > 0).length;
  const avgConf = (data.data.reduce((s, p) => s + p.confidence, 0) / data.data.length).toFixed(0);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><h3>${data.count}</h3><p>Матчей</p></div>
    <div class="stat-card"><h3>${valueBets}</h3><p>Value Bets</p></div>
    <div class="stat-card"><h3>${avgConf}%</h3><p>Avg Confidence</p></div>
    <div class="stat-card"><h3>${new Date(data.updated).toLocaleString('ru')}</h3><p>Updated</p></div>
  `;
}
function filterAndDisplay() {
  const league = document.getElementById('leagueFilter').value;
  const minVal = parseFloat(document.getElementById('valueFilter').value) || 0;
  const minConf = parseFloat(document.getElementById('confFilter').value) || 0;
  let filtered = allPredictions.filter(p => {
    const leagueMatch = league === 'all' || p.league === league;
    const confMatch = p.confidence >= minConf;
    return leagueMatch && confMatch;
  });
  const html = filtered.map(p => {
    const pred = p.predictions['1X2'];
    const totals = p.predictions.totals;
    const valueBetsHTML = p.value_bets.length > 0 ? `
      <div class="value-bets">
        <h4>💎 VALUE BETS:</h4>
        ${p.value_bets.map(v => `<div class="value-bet-item">${v.type}: +${v['value%']}% edge (${v.prob}% prob)</div>`).join('')}
      </div>
    ` : '';
    return `
      <div class="match-card">
        <div class="match-header">
          <span>${p.league}</span>
          <span class="confidence">Confidence: ${p.confidence}%</span>
        </div>
        <div class="match-teams">
          <span>${p.home}</span>
          <span class="vs">vs</span>
          <span>${p.away}</span>
        </div>
        <p style="opacity: 0.8; margin-bottom: 15px;">${p.date} ${p.time} | λ: ${p.lambda_home} vs ${p.lambda_away} | Injuries: ${p.injuries.home}/${p.injuries.away}</p>
        <div class="predictions">
          <div>
            <h4>1X2 Probabilities</h4>
            <div class="prob-bar">
              <div class="prob-fill prob-1" style="width: ${pred['1']}%">${pred['1']}%</div>
            </div>
            <div class="prob-bar">
              <div class="prob-fill prob-X" style="width: ${pred['X']}%">${pred['X']}%</div>
            </div>
            <div class="prob-bar">
              <div class="prob-fill prob-2" style="width: ${pred['2']}%">${pred['2']}%</div>
            </div>
          </div>
          <div>
            <h4>Over/Under 2.5</h4>
            <div class="prob-bar">
              <div class="prob-fill prob-1" style="width: ${totals.over2_5}%">Over: ${totals.over2_5}%</div>
            </div>
            <div class="prob-bar">
              <div class="prob-fill prob-2" style="width: ${totals.under2_5}%">Under: ${totals.under2_5}%</div>
            </div>
          </div>
        </div>
        ${valueBetsHTML}
      </div>
    `;
  }).join('');
  document.getElementById('matches').innerHTML = html || '<div class="error">No matches found</div>';
}
document.getElementById('leagueFilter').addEventListener('change', filterAndDisplay);
document.getElementById('valueFilter').addEventListener('input', filterAndDisplay);
document.getElementById('confFilter').addEventListener('input', filterAndDisplay);
loadPredictions();
</script>
</body>
</html>
